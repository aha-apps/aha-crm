<!-- modules/contacto/module.html -->
<!-- El contenido se renderiza dinamicamente desde module.js -->
<div x-data="contactoData()" x-init="initData()" class="animate__animated animate__fadeInUp">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div>
      <h2 class="text-2xl font-bold flex items-center gap-2"><i class="bi bi-people-fill text-primary"></i> Contactos</h2>
      <p class="text-sm text-base-content/50">Gestiona tus clientes y prospectos</p>
    </div>
    <button class="btn btn-primary" @click="abrirForm()"><i class="bi bi-plus-lg"></i> Agregar contacto</button>
  </div>
  <div class="flex flex-wrap gap-3 mb-4">
    <label class="input input-bordered flex items-center gap-2 flex-1 min-w-[200px]">
      <i class="bi bi-search text-base-content/40"></i>
      <input type="search" x-model="busqueda" @input.debounce="filtrar()" placeholder="Buscar contactos..." class="grow bg-transparent outline-none">
    </label>
  </div>
  <template x-if="cargando">
    <div class="space-y-3">
      <div class="sk-el h-16 w-full"></div>
      <div class="sk-el h-16 w-full"></div>
      <div class="sk-el h-16 w-full"></div>
    </div>
  </template>
  <template x-if="!cargando && filtrados.length">
    <div class="overflow-x-auto rounded-xl border border-base-300">
      <table class="table table-zebra">
        <thead><tr><th>Nombre</th><th class="hidden md:table-cell">Empresa</th><th class="hidden lg:table-cell">Tel&eacute;fono</th><th>Acciones</th></tr></thead>
        <tbody>
          <template x-for="item in filtrados" :key="item.id">
            <tr class="hover">
              <td><div class="flex items-center gap-3"><div class="avatar placeholder"><div class="w-9 rounded-full bg-primary text-primary-content text-xs font-bold"><span x-text="item.nombre ? item.nombre.charAt(0).toUpperCase() : '?'"></span></div></div><div><div class="font-medium" x-text="item.nombre"></div><div class="text-xs text-base-content/50 md:hidden" x-text="item.empresa || ''"></div></div></div></td>
              <td class="hidden md:table-cell text-base-content/70" x-text="item.empresa || '&mdash;'"></td>
              <td class="hidden lg:table-cell text-base-content/70" x-text="item.telefono || '&mdash;'"></td>
              <td><div class="flex gap-1"><button class="btn btn-sm btn-ghost btn-square" @click="verHistorial(item)" title="Historial"><i class="bi bi-clock-history"></i></button><button class="btn btn-sm btn-ghost btn-square" @click="abrirForm(item)" title="Editar"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-ghost btn-square text-error" @click="eliminar(item)" title="Eliminar"><i class="bi bi-trash"></i></button></div></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>
  <template x-if="!cargando && !filtrados.length">
    <div class="flex flex-col items-center justify-center py-20 text-base-content/40"><i class="bi bi-people text-6xl mb-4"></i><p class="text-lg mb-1 font-medium">No hay contactos a&uacute;n</p><p class="text-sm mb-6">Agrega tu primer contacto</p><button class="btn btn-primary" @click="abrirForm()"><i class="bi bi-plus-lg"></i> Agregar contacto</button></div>
  </template>
</div>
