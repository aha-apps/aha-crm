<!-- modules/reportes/module.html -->
<div x-data="reportesData()" x-init="initData()" class="animate__animated animate__fadeInUp">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div><h2 class="text-2xl font-bold flex items-center gap-2"><i class="bi bi-bar-chart-fill text-primary"></i> Reportes</h2><p class="text-sm text-base-content/50">Visualiza el rendimiento de ventas</p></div>
    <div class="flex gap-2">
      <button class="btn btn-ghost btn-sm" @click="exportCSV"><i class="bi bi-download"></i> CSV</button>
      <select x-model="mesSeleccionado" @change="actualizarGraficos()" class="select select-bordered select-sm">
        <template x-for="m in mesesDisponibles" :key="m.value"><option :value="m.value" x-text="m.label"></option></template>
      </select>
    </div>
  </div>
  <template x-if="cargando"><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="sk-el h-72 w-full"></div><div class="sk-el h-72 w-full"></div></div></template>
  <template x-if="!cargando">
    <div class="space-y-6">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="stat bg-base-100 rounded-2xl border border-base-300 p-4 shadow-sm"><div class="stat-title text-xs text-base-content/50">Total deals</div><div class="stat-value text-2xl text-primary" x-text="stats.totalDeals"></div></div>
        <div class="stat bg-base-100 rounded-2xl border border-base-300 p-4 shadow-sm"><div class="stat-title text-xs text-base-content/50">Cerrados</div><div class="stat-value text-2xl text-success" x-text="stats.cerrados"></div></div>
        <div class="stat bg-base-100 rounded-2xl border border-base-300 p-4 shadow-sm"><div class="stat-title text-xs text-base-content/50">En pipeline</div><div class="stat-value text-2xl text-info" x-text="stats.enPipeline"></div></div>
        <div class="stat bg-base-100 rounded-2xl border border-base-300 p-4 shadow-sm"><div class="stat-title text-xs text-base-content/50">Ingresos</div><div class="stat-value text-2xl text-secondary" x-text="UI.formatCurrency(stats.ingresos)"></div></div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-base-100 rounded-2xl border border-base-300 p-5 shadow-sm"><h3 class="font-semibold mb-4 flex items-center gap-2"><i class="bi bi-funnel text-primary"></i> Conversi&oacute;n por etapa</h3><canvas id="funnelChart" class="w-full h-64"></canvas></div>
        <div class="bg-base-100 rounded-2xl border border-base-300 p-5 shadow-sm"><h3 class="font-semibold mb-4 flex items-center gap-2"><i class="bi bi-coin text-secondary"></i> Ingresos por cliente</h3><canvas id="ingresosChart" class="w-full h-64"></canvas></div>
      </div>
      <div class="bg-base-100 rounded-2xl border border-base-300 p-5 shadow-sm">
        <h3 class="font-semibold mb-4"><i class="bi bi-check-circle text-success"></i> Deals cerrados</h3>
        <template x-if="dealsCerrados.length">
          <div class="overflow-x-auto"><table class="table table-sm"><thead><tr><th>Deal</th><th>Cliente</th><th>Monto</th></tr></thead><tbody><template x-for="d in dealsCerrados" :key="d.id"><tr><td x-text="d.nombre"></td><td x-text="d.contactoNombre || '&mdash;'"></td><td class="font-medium" x-text="UI.formatCurrency(d.monto)"></td></tr></template></tbody></table></div>
        </template>
        <template x-if="!dealsCerrados.length"><p class="text-sm text-base-content/40 text-center py-4">Sin deals cerrados este mes</p></template>
      </div>
    </div>
  </template>
</div>
