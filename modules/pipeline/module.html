<!-- modules/pipeline/module.html -->
<div x-data="pipelineData()" x-init="initData()" class="animate__animated animate__fadeInUp">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div>
      <h2 class="text-2xl font-bold flex items-center gap-2"><i class="bi bi-kanban-fill text-primary"></i> Pipeline de Ventas</h2>
      <p class="text-sm text-base-content/50">Arrastra las tarjetas entre etapas</p>
    </div>
    <button class="btn btn-primary" @click="abrirForm()"><i class="bi bi-plus-lg"></i> Nuevo deal</button>
  </div>
  <template x-if="cargando">
    <div class="flex gap-4 overflow-x-auto pb-4">
      <template x-for="i in 5"><div class="sk-el h-96 w-72 shrink-0"></div></template>
    </div>
  </template>
  <template x-if="!cargando">
    <div class="flex gap-4 overflow-x-auto pb-4" style="scroll-snap-type: x proximity;">
      <template x-for="etapa in etapas" :key="etapa.id">
        <div class="kanban-column bg-base-100 rounded-2xl border border-base-300 p-4 w-72 shrink-0" style="scroll-snap-align: start;" @drop.prevent="onDrop($event, etapa.id)" @dragover.prevent="onDragOver($event)" @dragleave.prevent="onDragLeave($event)">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2"><h3 class="font-semibold text-sm" x-text="etapa.label"></h3><span class="badge badge-sm" :class="etapa.color" x-text="etapa.count"></span></div>
            <button class="btn btn-ghost btn-xs btn-square" @click="abrirForm(null, etapa.id)" title="Agregar deal"><i class="bi bi-plus"></i></button>
          </div>
          <div class="space-y-3 min-h-[200px]">
            <template x-for="deal in getDeals(etapa.id)" :key="deal.id">
              <div class="kanban-card bg-base-100 rounded-xl border border-base-200 p-4 shadow-sm hover:shadow-md transition-shadow" draggable="true" @dragstart="onDragStart($event, deal)" @dragend="onDragEnd($event)">
                <div class="flex items-start justify-between gap-2 mb-2"><h4 class="font-medium text-sm leading-tight" x-text="deal.nombre"></h4><span class="text-sm font-bold text-primary shrink-0" x-text="UI.formatCurrency(deal.monto)"></span></div>
                <div class="flex items-center gap-2 text-xs text-base-content/60 mb-2"><i class="bi bi-person"></i><span x-text="deal.contactoNombre || 'Sin contacto'"></span></div>
                <div class="flex items-center justify-between">
                  <div class="radial-progress text-xs shrink-0" :style="'--value:' + (deal.probabilidad || 0) + ';--size:1.5rem;--thickness:3px'" :class="deal.probabilidad >= 70 ? 'text-success' : deal.probabilidad >= 40 ? 'text-warning' : 'text-base-content/30'"><span class="text-[8px]" x-text="deal.probabilidad + '%'"></span></div>
                  <div class="flex gap-1"><button class="btn btn-ghost btn-xs btn-square" @click.stop="abrirForm(deal)" title="Editar"><i class="bi bi-pencil text-xs"></i></button><button class="btn btn-ghost btn-xs btn-square text-error" @click.stop="eliminar(deal)" title="Eliminar"><i class="bi bi-trash text-xs"></i></button></div>
                </div>
                <div x-show="deal.fechaCierre" class="mt-2 text-xs text-base-content/40 flex items-center gap-1"><i class="bi bi-calendar3"></i><span x-text="UI.formatDate(deal.fechaCierre)"></span></div>
              </div>
            </template>
            <template x-if="!getDeals(etapa.id).length"><div class="flex flex-col items-center justify-center py-8 text-base-content/30 text-xs gap-2"><i class="bi bi-inbox text-2xl"></i><p>Sin deals</p></div></template>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
