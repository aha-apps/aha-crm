<!-- modules/cotizaciones/module.html -->
<div x-data="cotizacionesData()" x-init="initData()" class="animate__animated animate__fadeInUp">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div><h2 class="text-2xl font-bold flex items-center gap-2"><i class="bi bi-file-text-fill text-primary"></i> Cotizaciones</h2><p class="text-sm text-base-content/50">Crea cotizaciones desde tus deals</p></div>
    <button class="btn btn-primary" @click="abrirForm()"><i class="bi bi-plus-lg"></i> Nueva cotizaci&oacute;n</button>
  </div>
  <div class="flex flex-wrap gap-3 mb-4">
    <label class="input input-bordered flex items-center gap-2 flex-1 min-w-[200px]"><i class="bi bi-search text-base-content/40"></i><input type="search" x-model="busqueda" @input.debounce="filtrar()" placeholder="Buscar..." class="grow bg-transparent outline-none"></label>
    <select x-model="filtroEstado" @change="filtrar()" class="select select-bordered select-sm"><option value="">Todos</option><option value="borrador">Borrador</option><option value="enviada">Enviada</option><option value="aceptada">Aceptada</option><option value="rechazada">Rechazada</option></select>
  </div>
  <template x-if="cargando"><div class="space-y-3"><div class="sk-el h-16 w-full"></div><div class="sk-el h-16 w-full"></div><div class="sk-el h-16 w-full"></div></div></template>
  <template x-if="!cargando && filtrados.length">
    <div class="overflow-x-auto rounded-xl border border-base-300">
      <table class="table table-zebra">
        <thead><tr><th>Deal / Servicio</th><th class="hidden md:table-cell">Items</th><th>Total</th><th class="hidden sm:table-cell">Estado</th><th>Acciones</th></tr></thead>
        <tbody>
          <template x-for="item in filtrados" :key="item.id">
            <tr class="hover">
              <td><div class="font-medium" x-text="item.dealNombre || 'Sin deal'"></div><div class="text-xs text-base-content/50" x-text="'#' + item.id.slice(0,8)"></div></td>
              <td class="hidden md:table-cell text-base-content/70"><span x-text="(item.items ? item.items.length : 0) + ' items'"></span></td>
              <td class="font-semibold" x-text="UI.formatCurrency(item.total)"></td>
              <td class="hidden sm:table-cell"><span class="badge" :class="{'badge-ghost': item.estado==='borrador','badge-info': item.estado==='enviada','badge-success': item.estado==='aceptada','badge-error': item.estado==='rechazada'}" x-text="item.estado"></span></td>
              <td><div class="flex gap-1"><button class="btn btn-sm btn-ghost btn-square" @click="verPDF(item)" title="PDF"><i class="bi bi-file-earmark-pdf"></i></button><button class="btn btn-sm btn-ghost btn-square" @click="abrirForm(item)" title="Editar"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-ghost btn-square text-error" @click="eliminar(item)" title="Eliminar"><i class="bi bi-trash"></i></button></div></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>
  <template x-if="!cargando && !filtrados.length">
    <div class="flex flex-col items-center justify-center py-20 text-base-content/40"><i class="bi bi-file-text text-6xl mb-4"></i><p class="text-lg mb-1 font-medium">No hay cotizaciones</p><p class="text-sm mb-6">Crea cotizaciones desde tus deals</p><button class="btn btn-primary" @click="abrirForm()"><i class="bi bi-plus-lg"></i> Nueva cotizaci&oacute;n</button></div>
  </template>
</div>
